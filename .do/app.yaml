name: opek-booking-sync-agent
region: nyc

workers:
  - name: booking-sync-agent
    git:
      repo_clone_url: https://github.com/kittoe99/opek-junk.git
      branch: master
    source_dir: /
    dockerfile_path: Dockerfile.agent
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: ELEVENLABS_API_KEY
        type: SECRET
        # Set via DigitalOcean dashboard — do NOT commit value here
      - key: OPENAI_API_KEY
        type: SECRET
        # Set via DigitalOcean dashboard — do NOT commit value here
      - key: SUPABASE_URL
        value: "https://mjgwoukwyqwoectxfwqv.supabase.co"
        type: GENERAL
      - key: SUPABASE_ANON_KEY
        type: SECRET
        # Set via DigitalOcean dashboard — do NOT commit value here
      - key: SUPABASE_SERVICE_ROLE_KEY
        type: SECRET
        # Set via DigitalOcean dashboard — do NOT commit value here
