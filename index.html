    <style>
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background-color: #ffffff;
        color: #111111;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.01em;
      }

      /* Inter for all display headings */
      h1, h2, h3 {
        font-family: 'Inter', system-ui, sans-serif;
        letter-spacing: -0.02em;
      }

      /* Force all images and their clipping containers to have squared edges */
      img,
      picture,
      [class*="rounded-"]:has(img),
      [class*="rounded-"]:has(picture) {
        border-radius: 0px !important;
      }

      /* Force all form fields and their immediate containers to have squared edges */
      input:not([type="radio"]):not([type="checkbox"]),
      select,
      textarea,
      [class*="rounded-"]:has(> input:not([type="radio"]):not([type="checkbox"])),
      [class*="rounded-"]:has(> select),
      [class*="rounded-"]:has(> textarea) {
        border-radius: 0px !important;
      }

      /* Force all buttons, button-like links, and custom button links to have squared edges, except in the quick action bar */
      button:not(.quick-action-bar):not(.quick-action-bar *),
      [role="button"]:not(.quick-action-bar):not(.quick-action-bar *),
      a[class*="px-"][class*="py-"][class*="rounded-"]:not(.quick-action-bar):not(.quick-action-bar *) {
        border-radius: 0px !important;
      }
      
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px; /* Offset for sticky navbar */
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #c1c1c1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8;
      }

      /* Animations */
      .animate-fade-in {
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }

      .animate-slide-up {
        animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
      }

      .animate-fade-in-up {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      .animate-scale-in {
        animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: scale(0.95);
      }
      
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Mobile Menu Animation */
      .mobile-menu-enter {
        animation: slideDown 0.3s ease-out forwards;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Pulse animation for loading states */
      @keyframes pulse-slow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .animate-pulse-slow {
        animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
