<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    <linearGradient id="brandPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF006E" />
      <stop offset="100%" stop-color="#D9005B" />
    </linearGradient>
    <linearGradient id="brandBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A5D78" />
      <stop offset="100%" stop-color="#355070" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background Decorative Circle -->
  <circle cx="200" cy="200" r="160" fill="url(#bgGrad)" />
  <circle cx="200" cy="200" r="130" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Large heart (donation / charity) -->
  <g filter="url(#dropShadow)">
    <path d="M 200,300 C 200,300 80,230 80,155 C 80,120 108,100 140,100 C 164,100 184,112 200,130 C 216,112 236,100 260,100 C 292,100 320,120 320,155 C 320,230 200,300 200,300 Z" fill="url(#brandPink)" opacity="0.15"/>
    <path d="M 200,280 C 200,280 95,218 95,152 C 95,122 120,106 148,106 C 170,106 188,118 200,135 C 212,118 230,106 252,106 C 280,106 305,122 305,152 C 305,218 200,280 200,280 Z" fill="url(#brandPink)"/>
  </g>

  <!-- Handshake in center of heart -->
  <g transform="translate(120, 155)">
    <!-- Left hand -->
    <path d="M 0,30 C 10,20 30,18 50,25 L 80,35 C 75,48 60,52 45,46 Z" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>
    <!-- Right hand -->
    <path d="M 160,30 C 150,20 130,18 110,25 L 80,35 C 85,48 100,52 115,46 Z" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>
    <!-- Clasped center -->
    <ellipse cx="80" cy="36" rx="20" ry="12" fill="#CBD5E1" stroke="#E2E8F0" stroke-width="2"/>
    <!-- White highlight -->
    <path d="M 68,30 Q 80,26 92,30" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Truck (small, delivering to charity) -->
  <g transform="translate(40, 240)" filter="url(#dropShadow)" opacity="0.9">
    <!-- Cargo box -->
    <rect x="0" y="0" width="100" height="55" rx="4" fill="url(#brandBlue)"/>
    <!-- Cargo brand stripe -->
    <rect x="0" y="18" width="100" height="10" fill="url(#brandPink)" opacity="0.8"/>
    <!-- Cab -->
    <rect x="100" y="14" width="45" height="41" rx="4" fill="#4A5D78"/>
    <!-- Window -->
    <rect x="108" y="20" width="30" height="22" rx="3" fill="#E2E8F0"/>
    <!-- Light -->
    <rect x="138" y="36" width="8" height="6" rx="1" fill="#FF006E"/>
    <!-- Wheels -->
    <circle cx="24" cy="57" r="14" fill="#0F172A"/>
    <circle cx="24" cy="57" r="6" fill="#CBD5E1"/>
    <circle cx="80" cy="57" r="14" fill="#0F172A"/>
    <circle cx="80" cy="57" r="6" fill="#CBD5E1"/>
    <circle cx="125" cy="57" r="14" fill="#0F172A"/>
    <circle cx="125" cy="57" r="6" fill="#CBD5E1"/>
  </g>

  <!-- Floating items being donated -->
  <!-- Chair icon -->
  <g transform="translate(285, 150)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="56" height="48" rx="6" fill="#FFFFFF"/>
    <rect x="8" y="18" width="40" height="16" rx="3" fill="#CBD5E1"/>
    <rect x="8" y="8" width="40" height="12" rx="3" fill="#E2E8F0"/>
    <line x1="14" y1="34" x2="12" y2="46" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <line x1="42" y1="34" x2="44" y2="46" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Heart sparkles -->
  <circle cx="155" cy="130" r="5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="245" cy="128" r="3.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="170" cy="115" r="3" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="230" cy="118" r="4" fill="#FFFFFF" opacity="0.55"/>

  <!-- "CHARITY" label on truck -->
  <text x="22" y="12" font-family="system-ui, sans-serif" font-weight="900" font-size="9" fill="#FFFFFF" letter-spacing="2" transform="translate(40, 240)">DONATION</text>
</svg>
