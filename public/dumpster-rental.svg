<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    <linearGradient id="brandPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF006E" />
      <stop offset="100%" stop-color="#D9005B" />
    </linearGradient>
    <linearGradient id="brandBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A5D78" />
      <stop offset="100%" stop-color="#355070" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background Decorative Circle -->
  <circle cx="200" cy="200" r="160" fill="url(#bgGrad)" />
  <circle cx="200" cy="200" r="130" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Ground Shadows -->
  <ellipse cx="200" cy="310" rx="110" ry="12" fill="#E2E8F0" />
  
  <!-- Dumpster Body (Roll-Off Dumpster in perspective) -->
  <g transform="translate(60, 110)" filter="url(#dropShadow)">
    <!-- Front Face (Dark Blue-Grey) -->
    <path d="M 10,60 L 250,60 L 230,160 L 30,160 Z" fill="url(#brandBlue)" />
    
    <!-- Top Rim (Pink Accent) -->
    <path d="M 5,50 L 255,50 L 250,60 L 10,60 Z" fill="url(#brandPink)" />
    
    <!-- Bottom Rim / Skids (Dark Slate) -->
    <rect x="25" y="160" width="20" height="8" rx="2" fill="#0F172A" />
    <rect x="185" y="160" width="20" height="8" rx="2" fill="#0F172A" />
    <line x1="30" y1="160" x2="210" y2="160" stroke="#0F172A" stroke-width="4" />
    
    <!-- Vertical Support Ribs on the side (Vector detailing) -->
    <path d="M 50,60 L 60,160" stroke="#1E293B" stroke-width="6" opacity="0.3" stroke-linecap="round" />
    <path d="M 100,60 L 105,160" stroke="#1E293B" stroke-width="6" opacity="0.3" stroke-linecap="round" />
    <path d="M 150,60 L 150,160" stroke="#1E293B" stroke-width="6" opacity="0.3" stroke-linecap="round" />
    <path d="M 200,60 L 195,160" stroke="#1E293B" stroke-width="6" opacity="0.3" stroke-linecap="round" />

    <!-- Right Side Face (Perspective thickness) -->
    <path d="M 250,60 L 280,45 L 280,130 L 230,160 Z" fill="#2D3F55" />
    <!-- Top Right Rim -->
    <path d="M 255,50 L 285,38 L 280,45 L 250,60 Z" fill="#D9005B" />

    <!-- Open Top Opening / Interior View -->
    <path d="M 10,60 L 250,60 L 280,45 L 40,45 Z" fill="#1E293B" />

    <!-- Rolloff Wheels -->
    <circle cx="45" cy="172" r="10" fill="#0F172A" />
    <circle cx="45" cy="172" r="4" fill="#64748B" />
    <circle cx="195" cy="172" r="10" fill="#0F172A" />
    <circle cx="195" cy="172" r="4" fill="#64748B" />
    
    <!-- Hazard Stripe decal on side (Pink & White stripes) -->
    <g transform="translate(110, 80)">
      <rect x="0" y="0" width="60" height="15" fill="#FFFFFF" rx="2" />
      <path d="M 0,15 L 10,0 L 20,0 L 10,15 Z" fill="#FF006E" />
      <path d="M 20,15 L 30,0 L 40,0 L 30,15 Z" fill="#FF006E" />
      <path d="M 40,15 L 50,0 L 60,0 L 50,15 Z" fill="#FF006E" />
    </g>

    <!-- Stylized Trash protruding from top -->
    <g transform="translate(60, 20)">
      <!-- Cardboard Box -->
      <path d="M 40,25 L 70,15 L 85,28 L 55,38 Z" fill="#E2E8F0" />
      <path d="M 40,25 L 55,38 L 55,50 L 40,37 Z" fill="#CBD5E1" />
      <!-- Tape on Box -->
      <path d="M 50,22 L 65,32" stroke="#FF006E" stroke-width="2" />
      <!-- Pink Chair Back sticking out -->
      <path d="M 90,0 L 110,10 L 105,35 L 85,25 Z" fill="none" stroke="#FF006E" stroke-width="4" stroke-linejoin="round" />
    </g>
  </g>
</svg>
