<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    <linearGradient id="brandPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF006E" />
      <stop offset="100%" stop-color="#D9005B" />
    </linearGradient>
    <linearGradient id="brandBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A5D78" />
      <stop offset="100%" stop-color="#355070" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background Decorative Circle -->
  <circle cx="200" cy="200" r="160" fill="url(#bgGrad)" />
  <circle cx="200" cy="200" r="130" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Ground shadow -->
  <ellipse cx="200" cy="330" rx="110" ry="10" fill="#E2E8F0" opacity="0.8"/>

  <!-- Dumpster container -->
  <g filter="url(#dropShadow)">
    <!-- Main body -->
    <rect x="80" y="200" width="240" height="120" rx="6" fill="url(#brandBlue)"/>
    <!-- Top opening rim -->
    <rect x="75" y="192" width="250" height="18" rx="4" fill="#355070"/>
    <!-- Angled lid panels (open) -->
    <path d="M 80,192 L 110,140 L 190,140 L 190,192 Z" fill="#4A5D78"/>
    <path d="M 190,192 L 190,140 L 270,140 L 300,192 Z" fill="#355070"/>
    <!-- Lid highlight -->
    <line x1="110" y1="142" x2="190" y2="142" stroke="#E2E8F0" stroke-width="2" opacity="0.3"/>
    <!-- Ribs on container -->
    <line x1="150" y1="210" x2="150" y2="318" stroke="#355070" stroke-width="3" opacity="0.5"/>
    <line x1="200" y1="210" x2="200" y2="318" stroke="#355070" stroke-width="3" opacity="0.5"/>
    <line x1="250" y1="210" x2="250" y2="318" stroke="#355070" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- Brand stripe -->
  <rect x="80" y="250" width="240" height="18" rx="0" fill="url(#brandPink)" opacity="0.85"/>
  <!-- Brand text pill -->
  <rect x="152" y="253" width="96" height="12" rx="4" fill="#FFFFFF" opacity="0.18"/>
  <text x="178" y="263" font-family="system-ui, sans-serif" font-weight="900" font-size="9" fill="#FFFFFF" letter-spacing="2">FLAT RATE</text>

  <!-- Wheels / feet -->
  <rect x="102" y="315" width="28" height="16" rx="4" fill="#0F172A"/>
  <rect x="270" y="315" width="28" height="16" rx="4" fill="#0F172A"/>

  <!-- Items sticking out of dumpster (visible above lid) -->
  <!-- Broken wood plank -->
  <rect x="120" y="118" width="12" height="45" rx="2" fill="#94A3B8" transform="rotate(-15, 126, 140)"/>
  <!-- Metal pipe -->
  <rect x="180" y="105" width="8" height="50" rx="3" fill="#CBD5E1"/>
  <!-- Box corner -->
  <rect x="230" y="115" width="30" height="28" rx="2" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="233" y="115" width="15" height="6" fill="#FF006E" opacity="0.7"/>

  <!-- Small truck delivering dumpster in background -->
  <g transform="translate(30, 100)" opacity="0.4">
    <rect x="0" y="40" width="50" height="30" rx="3" fill="#4A5D78"/>
    <rect x="50" y="50" width="20" height="20" rx="3" fill="#355070"/>
    <rect x="54" y="54" width="12" height="12" rx="2" fill="#E2E8F0"/>
    <circle cx="12" cy="72" r="7" fill="#0F172A"/>
    <circle cx="45" cy="72" r="7" fill="#0F172A"/>
  </g>

  <!-- Price tag floating -->
  <g transform="translate(298, 145)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="62" height="40" rx="8" fill="#FFFFFF"/>
    <text x="8" y="18" font-family="system-ui, sans-serif" font-weight="900" font-size="14" fill="#355070">$299</text>
    <rect x="8" y="22" width="46" height="5" rx="2" fill="#FF006E" opacity="0.7"/>
    <rect x="8" y="30" width="32" height="4" rx="2" fill="#E2E8F0"/>
  </g>
</svg>
